<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f2f2f2;
    margin:0;
}

/* MENU */
.menu{
    background:#e6e6e6;
    padding:10px;
    text-align:center;
    border-bottom:2px solid #ccc;
}

.menu a{
    text-decoration:none;
    margin:0 10px;
    color:black;
}

/* FORM BOX */

.container{
    width:420px;
    margin:80px auto;
    border:1px solid #ccc;
    background:white;
    padding:30px;
}

.container h3{
    text-align:center;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:inline-block;
    width:110px;
}

input{
    width:230px;
    padding:6px;
}

/* BUTTON AREA */

.actions{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    background:#2c7be5;
    border:none;
    color:white;
    padding:8px 16px;
    cursor:pointer;
}

/* FOOTER */

.footer{
    text-align:center;
    border-top:1px solid #ccc;
    padding:10px;
    margin-top:60px;
}

</style>
</head>

<body>

<div class="menu">
    <a href="#">Home</a> |
    <a href="login.html">Đăng nhập</a> |
    <a href="#">Đăng ký</a>
</div>

<div class="container">

<h3>Màn hình đăng ký</h3>

<form>

<div class="form-group">
<label>Username</label>
<input type="text">
</div>

<div class="form-group">
<label>Mật khẩu</label>
<input type="password">
</div>

<div class="form-group">
<label>Nhập lại mật khẩu</label>
<input type="password">
</div>

<div class="form-group">
<label>Email</label>
<input type="email">
</div>

<div class="actions">
<a href="login.html">Đã có tài khoản</a>
<button type="submit">Đăng ký</button>
</div>

</form>

</div>

<div class="footer">
Lập trình web ©01/2024
</div>

</body>
</html>
