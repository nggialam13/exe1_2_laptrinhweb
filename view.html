<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Xem chi tiết user</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
    margin:0;
}

/* MENU */

.menu{
    text-align:center;
    padding:10px;
    background:#e6e6e6;
    border-bottom:2px solid #ccc;
}

.menu a{
    text-decoration:none;
    margin:0 10px;
    color:black;
}

/* BOX */

.container{
    width:400px;
    margin:80px auto;
    border:1px solid #ccc;
    background:white;
    padding:30px;
}

/* TITLE */

.container h3{
    text-align:center;
    margin-bottom:30px;
}

/* INFO */

.info{
    margin-bottom:15px;
}

.label{
    display:inline-block;
    width:100px;
    font-weight:bold;
}

/* BUTTON */

.btn{
    text-align:right;
    margin-top:20px;
}

button{
    background:#2c7be5;
    border:none;
    color:white;
    padding:8px 16px;
    cursor:pointer;
}

/* FOOTER */

.footer{
    text-align:center;
    border-top:1px solid #ccc;
    padding:10px;
    margin-top:60px;
}

</style>

</head>

<body>

<div class="menu">
    <a href="#">Home</a> |
    <a href="#">Đăng xuất</a>
</div>

<div class="container">

<h3>Màn hình chi tiết</h3>

<div class="info">
<span class="label">Username</span>
<span>test1</span>
</div>

<div class="info">
<span class="label">Email</span>
<span>test1@gmail.com</span>
</div>

<div class="btn">
<button>Chỉnh sửa</button>
</div>

</div>

<div class="footer">
Lập trình web @01/2024
</div>

</body>
</html>
